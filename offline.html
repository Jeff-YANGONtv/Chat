<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Offline — Workspace Chat</title>
<meta name="theme-color" content="#0d1117" />
<link rel="icon" href="/icons/favicon.ico" />
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(1200px 800px at 50% -10%, #1b2233 0%, #0d1117 60%, #05070b 100%);
    color: #e6edf3;
  }
  .wrap {
    min-height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 24px; text-align: center;
  }
  .icon {
    width: 96px; height: 96px; border-radius: 24px;
    background-image: url("/icons/icon-192.png");
    background-size: cover; background-position: center;
    box-shadow: 0 10px 40px rgba(0, 200, 255, 0.15);
    margin-bottom: 24px;
  }
  h1 { margin: 0 0 8px; font-size: 22px; font-weight: 700; }
  p { margin: 0 0 24px; color: #8b949e; max-width: 320px; line-height: 1.5; }
  button {
    background: linear-gradient(135deg, #2f81f7, #6f42c1);
    color: #fff; border: 0; padding: 12px 28px; border-radius: 999px;
    font-size: 15px; font-weight: 600; cursor: pointer;
    box-shadow: 0 6px 20px rgba(47, 129, 247, 0.35);
    transition: transform .15s ease;
  }
  button:active { transform: scale(0.97); }
  .dots { margin-top: 20px; color: #6a737d; font-size: 13px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="icon" role="img" aria-label="Workspace Chat"></div>
    <h1>You're offline</h1>
    <p>Workspace Chat couldn't reach the server. Please check your connection and try again.</p>
    <button onclick="location.reload()">Retry</button>
    <div class="dots" id="status">Waiting for network…</div>
  </div>
  <script>
    window.addEventListener("online", () => location.reload());
    setInterval(() => {
      document.getElementById("status").textContent =
        navigator.onLine ? "Back online — reloading…" : "Waiting for network…";
      if (navigator.onLine) location.reload();
    }, 3000);
  </script>
</body>
</html>
