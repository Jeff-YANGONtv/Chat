<!--
  ═══════════════════════════════════════════════════════════════════
  WORKSPACE CHAT — PWA INJECTION SNIPPET
  ═══════════════════════════════════════════════════════════════════
  HOW TO USE:
    1. Open your existing `public/index.html` in the Chat repo
    2. Paste EVERYTHING between the START/END markers below into
       your <head> section (before </head>)
    3. Also add ONE line right after <body> (see BOTTOM section)
    4. Commit + push → Vercel auto-redeploys → your site is a PWA!
  ═══════════════════════════════════════════════════════════════════
-->

<!-- ══════════ START: paste inside <head> ══════════ -->

<!-- ══════════ START: paste right before </body> ══════════ -->

<!-- Install prompt UI -->
<div id="pwa-install-banner" style="
  position: fixed; bottom: 16px; left: 16px; right: 16px;
  background: linear-gradient(135deg, #161b22 0%, #0d1117 100%);
  border: 1px solid #30363d; border-radius: 16px;
  padding: 14px 16px; display: none; z-index: 9999;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
  color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  align-items: center; gap: 12px;">
  <img src="/icons/icon-96.png" alt="" style="width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0;" />
  <div style="flex: 1; min-width: 0;">
    <div style="font-weight: 600; font-size: 14px;">Install Workspace Chat</div>
    <div style="font-size: 12px; color: #8b949e; margin-top: 2px;">Add to your home screen for quick access</div>
  </div>
  <button id="pwa-install-btn" style="
    background: linear-gradient(135deg, #2f81f7, #6f42c1); color: #fff;
    border: 0; padding: 8px 16px; border-radius: 999px;
    font-size: 13px; font-weight: 600; cursor: pointer;">Install</button>
  <button id="pwa-dismiss-btn" style="
    background: transparent; color: #8b949e; border: 0;
    font-size: 20px; cursor: pointer; padding: 4px 8px;">×</button>
</div>

<!-- Service Worker registration + install prompt -->
<script>
  (function () {
    // Register service worker
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("/service-worker.js", { scope: "/" })
          .then(function (reg) {
            console.log("[PWA] Service Worker registered:", reg.scope);
            // Check for updates every 60s
            setInterval(function () { reg.update(); }, 60000);
            reg.addEventListener("updatefound", function () {
              var newSW = reg.installing;
              if (!newSW) return;
              newSW.addEventListener("statechange", function () {
                if (newSW.state === "installed" && navigator.serviceWorker.controller) {
                  console.log("[PWA] New version available");
                }
              });
            });
          })
          .catch(function (err) { console.warn("[PWA] SW registration failed:", err); });
      });
    }

    // Install prompt (Chrome/Edge/Android)
    var deferredPrompt = null;
    var banner = document.getElementById("pwa-install-banner");
    var installBtn = document.getElementById("pwa-install-btn");
    var dismissBtn = document.getElementById("pwa-dismiss-btn");

    // Don't show again for 7 days after dismiss
    var dismissedAt = parseInt(localStorage.getItem("pwa-dismissed-at") || "0", 10);
    var SEVEN_DAYS = 7 * 24 * 60 * 60 * 1000;
    var recentlyDismissed = (Date.now() - dismissedAt) < SEVEN_DAYS;

    window.addEventListener("beforeinstallprompt", function (e) {
      e.preventDefault();
      deferredPrompt = e;
      if (banner && !recentlyDismissed) {
        banner.style.display = "flex";
      }
    });

    if (installBtn) {
      installBtn.addEventListener("click", function () {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function (choice) {
          console.log("[PWA] User choice:", choice.outcome);
          deferredPrompt = null;
          if (banner) banner.style.display = "none";
        });
      });
    }
    if (dismissBtn) {
      dismissBtn.addEventListener("click", function () {
        if (banner) banner.style.display = "none";
        localStorage.setItem("pwa-dismissed-at", Date.now().toString());
      });
    }

    window.addEventListener("appinstalled", function () {
      console.log("[PWA] App installed!");
      if (banner) banner.style.display = "none";
    });

    // iOS install hint (Safari doesn't support beforeinstallprompt)
    var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    var isStandalone = window.matchMedia("(display-mode: standalone)").matches
                    || window.navigator.standalone === true;
    if (isIOS && !isStandalone && !recentlyDismissed && banner) {
      var msg = banner.querySelector("div > div:nth-child(2)");
      if (msg) msg.textContent = "Tap Share → Add to Home Screen";
      if (installBtn) installBtn.style.display = "none";
      banner.style.display = "flex";
    }
  })();
</script>
